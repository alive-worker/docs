<svg viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="AI API按token怎么计费输入输出价差与用量估算封面图">
  <defs>
    <linearGradient id="bgGradAitk" x1="0" y1="0" x2="800" y2="400" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#051f1c"/>
      <stop offset="1" stop-color="#0f3a35"/>
    </linearGradient>
    <radialGradient id="glowAitk" cx="680" cy="70" r="260" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#2dd4c4" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#2dd4c4" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="800" height="400" fill="url(#bgGradAitk)"/>
  <rect width="800" height="400" fill="url(#glowAitk)"/>
  <g stroke="#1c5a53" stroke-width="1.4" opacity="0.55" fill="none">
    <path d="M40 40 h90 v50 h60"/>
    <path d="M60 360 h80 v-45 h55"/>
  </g>
  <g fill="#7fe0d3">
    <circle cx="40" cy="40" r="3.5"/>
    <circle cx="130" cy="40" r="3.5"/>
    <circle cx="190" cy="90" r="3.5"/>
    <circle cx="60" cy="360" r="3.5"/>
    <circle cx="140" cy="360" r="3.5"/>
    <circle cx="195" cy="315" r="3.5"/>
  </g>

  <rect x="64" y="70" width="96" height="96" rx="22" fill="#0f3a35" stroke="#7fe0d3" stroke-width="2.5"/>
  <g fill="#7fe0d3">
    <rect x="84" y="96" width="16" height="16" rx="3"/>
    <rect x="104" y="96" width="16" height="16" rx="3"/>
    <rect x="124" y="96" width="16" height="16" rx="3" opacity="0.5"/>
    <rect x="84" y="116" width="16" height="16" rx="3" opacity="0.5"/>
    <rect x="104" y="116" width="16" height="16" rx="3"/>
    <rect x="124" y="116" width="16" height="16" rx="3"/>
    <rect x="84" y="136" width="16" height="16" rx="3"/>
    <rect x="104" y="136" width="16" height="16" rx="3" opacity="0.5"/>
    <rect x="124" y="136" width="16" height="16" rx="3"/>
  </g>

  <text x="64" y="230" font-family="-apple-system, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="40" font-weight="700" fill="#e6fbf8">API 按 token</text>
  <text x="64" y="278" font-family="-apple-system, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="40" font-weight="700" fill="#e6fbf8">用量计费</text>
  <text x="66" y="308" font-family="-apple-system, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="17" font-weight="600" letter-spacing="2" fill="#7fe0d3">INPUT &#183; OUTPUT &#183; CONTEXT</text>
  <text x="736" y="366" text-anchor="end" font-family="-apple-system, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="16" font-weight="700" fill="#7fe0d3" opacity="0.85">AI服务指南</text>

  <rect x="420" y="70" width="330" height="230" rx="16" fill="#0f3a35" stroke="#1c5a53" stroke-width="1.5"/>
  <circle cx="446" cy="100" r="6" fill="#7fe0d3"/>
  <text x="462" y="105" font-family="-apple-system, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="14" font-weight="700" fill="#e6fbf8">token 计费拆解</text>
  <line x1="440" y1="122" x2="730" y2="122" stroke="#1c5a53" stroke-width="1"/>

  <text x="440" y="150" font-family="-apple-system, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="13" fill="#c9ede8">输入 token</text>
  <text x="730" y="150" text-anchor="end" font-family="-apple-system, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="13" font-weight="700" fill="#7fe0d3">单价较低</text>

  <text x="440" y="180" font-family="-apple-system, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="13" fill="#c9ede8">输出 token</text>
  <text x="730" y="180" text-anchor="end" font-family="-apple-system, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="13" font-weight="700" fill="#7fe0d3">单价更高</text>

  <line x1="440" y1="198" x2="730" y2="198" stroke="#1c5a53" stroke-width="1"/>
  <text x="440" y="220" font-family="-apple-system, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="13" font-weight="700" fill="#e6fbf8">上下文越长</text>
  <text x="730" y="220" text-anchor="end" font-family="-apple-system, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="13" font-weight="700" fill="#7fe0d3">每次调用越贵</text>

  <rect x="440" y="238" width="290" height="44" rx="10" fill="#051f1c" stroke="#1c5a53" stroke-width="1"/>
  <text x="454" y="265" font-family="-apple-system, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="13" font-weight="600" fill="#dcf7f2">&#10003; 充值前先估算月度 token 用量</text>
</svg>
